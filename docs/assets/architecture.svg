<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BreachResponse architecture</title>
  <desc id="desc">Mantle telemetry flows into the Python sentinel, LLM incident analysis, the operator command center, Mantle registry contracts, and GenLayer consensus guard before approved emergency action.</desc>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.7"/>
    </pattern>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10B981"/>
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
    <style>
      .label { font: 700 18px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #f8fafc; letter-spacing: .02em; }
      .sub { font: 500 12px 'Inter', 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .tiny { font: 700 10px 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace; fill: #10B981; letter-spacing: .12em; }
      .line { stroke: #10B981; stroke-width: 2.5; marker-end: url(#arrow); filter: url(#glow); }
      .soft-line { stroke: #94a3b8; stroke-width: 2; marker-end: url(#arrow-soft); stroke-dasharray: 6 6; }
      .box-bg { fill: #0f172a; }
      .mantle { fill: rgba(6, 78, 59, .45); stroke: #10B981; }
      .agent { fill: rgba(8, 51, 68, .45); stroke: #22d3ee; }
      .analysis { fill: rgba(76, 29, 149, .38); stroke: #a78bfa; }
      .command { fill: rgba(30, 41, 59, .65); stroke: #e2e8f0; }
      .genlayer { fill: rgba(120, 53, 15, .35); stroke: #fbbf24; }
      .security { fill: rgba(136, 19, 55, .35); stroke: #fb7185; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="28" fill="#020617"/>
  <rect width="1200" height="760" rx="28" fill="url(#grid)" opacity="0.75"/>
  <circle cx="600" cy="360" r="330" fill="#10B981" opacity="0.05"/>
  <circle cx="930" cy="160" r="180" fill="#fbbf24" opacity="0.06"/>
  <circle cx="260" cy="590" r="220" fill="#22d3ee" opacity="0.05"/>

  <text x="72" y="76" class="tiny">BREACHRESPONSE SYSTEM MAP</text>
  <text x="72" y="112" class="label" font-size="30">Mantle execution secured by GenLayer consensus validation</text>
  <text x="72" y="140" class="sub">Users stay on Mantle. Ambiguous incident decisions route to GenLayer before approved response actions.</text>

  <path class="line" d="M600 210 L600 260"/>
  <path class="line" d="M600 350 L600 400"/>
  <path class="line" d="M600 490 L600 540"/>
  <path class="line" d="M470 610 C360 610 320 575 320 520"/>
  <path class="line" d="M730 610 C850 610 890 575 890 520"/>
  <path class="soft-line" d="M890 430 C830 360 770 325 690 320"/>
  <path class="line" d="M890 610 C890 665 810 690 680 690"/>

  <g transform="translate(430 160)">
    <rect class="box-bg" width="340" height="72" rx="14"/>
    <rect class="mantle" width="340" height="72" rx="14" stroke-width="1.8"/>
    <text x="28" y="32" class="label">Mantle RPC + telemetry</text>
    <text x="28" y="54" class="sub">Protected protocols, vault status, transaction flow</text>
  </g>

  <g transform="translate(430 280)">
    <rect class="box-bg" width="340" height="72" rx="14"/>
    <rect class="agent" width="340" height="72" rx="14" stroke-width="1.8"/>
    <text x="28" y="32" class="label">Python Sentinel Agent</text>
    <text x="28" y="54" class="sub">Scans, normalizes alerts, prepares evidence</text>
  </g>

  <g transform="translate(430 420)">
    <rect class="box-bg" width="340" height="72" rx="14"/>
    <rect class="analysis" width="340" height="72" rx="14" stroke-width="1.8"/>
    <text x="28" y="32" class="label">LLM incident analysis</text>
    <text x="28" y="54" class="sub">Threat class, confidence, proposed action</text>
  </g>

  <g transform="translate(430 560)">
    <rect class="box-bg" width="340" height="86" rx="14"/>
    <rect class="command" width="340" height="86" rx="14" stroke-width="1.8"/>
    <text x="28" y="34" class="label">Operator Command Center</text>
    <text x="28" y="58" class="sub">Human approval, wallet state, incident ledger</text>
  </g>

  <g transform="translate(130 430)">
    <rect class="box-bg" width="300" height="92" rx="14"/>
    <rect class="mantle" width="300" height="92" rx="14" stroke-width="1.8"/>
    <text x="24" y="34" class="label">Mantle Registry</text>
    <text x="24" y="58" class="sub">Sentinel permissions and protected contracts</text>
    <text x="24" y="76" class="tiny">EXECUTION NETWORK</text>
  </g>

  <g transform="translate(770 430)">
    <rect class="box-bg" width="300" height="92" rx="14"/>
    <rect class="genlayer" width="300" height="92" rx="14" stroke-width="1.8"/>
    <text x="24" y="34" class="label">GenLayer Consensus Guard</text>
    <text x="24" y="58" class="sub">Validator review for uncertain decisions</text>
    <text x="24" y="76" class="tiny">VALIDATION LAYER</text>
  </g>

  <g transform="translate(470 670)">
    <rect class="box-bg" width="260" height="52" rx="14"/>
    <rect class="security" width="260" height="52" rx="14" stroke-width="1.8"/>
    <text x="24" y="31" class="label" font-size="16">Approved emergency action</text>
  </g>

  <g transform="translate(72 674)">
    <rect x="0" y="0" width="270" height="42" rx="10" fill="#0f172a" stroke="#1e293b"/>
    <circle cx="22" cy="21" r="5" fill="#10B981"/>
    <text x="40" y="25" class="sub">Mantle handles risk and response</text>
  </g>
  <g transform="translate(858 674)">
    <rect x="0" y="0" width="270" height="42" rx="10" fill="#0f172a" stroke="#1e293b"/>
    <circle cx="22" cy="21" r="5" fill="#fbbf24"/>
    <text x="40" y="25" class="sub">GenLayer validates hard calls</text>
  </g>
</svg>
